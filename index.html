<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conquest Map Maker</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="hex_map.css" />
  </head>

  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="brand-title">Conquest Map</div>

          <div class="panel-body">
            <div class="row">
              <button id="undo" class="btn btn-secondary" type="button">Undo</button>
              <button id="redo" class="btn btn-secondary" type="button">Redo</button>
              <button id="reset" class="btn" type="button">Reset map</button>
            </div>

            <div class="row">
              <div class="field">
                <div class="field-label">Width</div>
                <input id="width" class="field-input" type="text" value="AO" />
              </div>

              <div class="field">
                <div class="field-label">Height</div>
                <input id="height" class="field-input" type="number" value="42" />
              </div>
            </div>

            <div class="row">
              <div class="field" style="flex: 1 1 100%;">
                <div class="field-label">Theme</div>

                <div id="theme-dropdown" class="dropdown">
                  <button id="theme-btn" class="dropdown-btn" type="button" aria-expanded="false">
                    <span id="theme-label">Grass</span>
                    <span class="dropdown-caret">▾</span>
                  </button>

                  <div id="theme-menu" class="dropdown-menu" role="listbox">
                    <button class="dropdown-item" type="button" data-value="grass">Grass</button>
                    <button class="dropdown-item" type="button" data-value="sand">Sand</button>
                    <button class="dropdown-item" type="button" data-value="halloween">Halloween</button>
                    <button class="dropdown-item" type="button" data-value="easter">Easter</button>
                    <button class="dropdown-item" type="button" data-value="winter">Winter</button>
                  </div>

                  <select id="theme" style="display:none">
                    <option value="grass">Grass</option>
                    <option value="sand">Sand</option>
                    <option value="halloween">Halloween</option>
                    <option value="easter">Easter</option>
                    <option value="winter">Winter</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="row">
              <label class="toggle">
                <input id="change-theme" type="checkbox" checked />
                Apply theme to existing map (keep tile indexes)
              </label>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Palette</div>
            
          </div>
          <div class="panel-body">
            <div id="palette" class="palette"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Export / Import</div>
            
          </div>
          <div class="panel-body">
            <div class="row">
              <button id="export-json" class="btn btn-secondary" type="button">Export JSON</button>
              <button id="export-code" class="btn btn-secondary" type="button">Export Code</button>
              <button id="export-png" class="btn btn-secondary" type="button">Export PNG</button>
              <button id="import" class="btn" type="button">Import</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Stats</div>
            
          </div>
          <div class="panel-body">
            <div class="stats">
              <div class="stat">
                <div class="stat-label">Buildable</div>
                <div class="stat-value" id="buildable"></div>
              </div>
              <div class="stat">
                <div class="stat-label">Center</div>
                <div class="stat-value" id="center"></div>
              </div>
              <div class="stat">
                <div class="stat-label">Points</div>
                <div class="stat-value" id="points"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <div id="grid" class="grid"></div>
      </main>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div id="modal-title" class="modal-title">Export</div>
          <button id="modal-close" class="icon-btn" type="button">✕</button>
        </div>

        <div class="modal-body">
          <textarea id="modal-text" class="modal-text" spellcheck="false"></textarea>
          <div id="modal-hint" class="modal-hint"></div>
        </div>

        <div class="modal-footer">
          <button id="modal-secondary" class="btn btn-secondary" type="button">Close</button>
          <button id="modal-primary" class="btn" type="button">Copy</button>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="hex_map.js"></script>
  </body>

</html>
